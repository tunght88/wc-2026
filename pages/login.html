<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - WC 2026 Predictions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="text-center mb-6">
        <div class="wc-logo-icon mx-auto mb-3">⚽</div>
        <h1 class="login-title">WC 2026 Predictions</h1>
        <p class="login-subtitle">Dự đoán kết quả FIFA World Cup 2026</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Tên đăng nhập</label>
          <input type="text" id="username" class="form-input" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mật khẩu</label>
          <input type="password" id="password" class="form-input" required autocomplete="current-password">
        </div>
        <div id="login-error" class="error-banner hidden"></div>
        <button type="submit" class="btn btn-primary w-full" id="login-btn">Đăng nhập</button>
      </form>

      <p class="text-center mt-4 text-sm text-gray-600">
        Chưa có tài khoản?
        <a href="register.html" class="text-green-700 font-medium hover:underline">Đăng ký</a>
      </p>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    (function () {
      if (getSession()) {
        window.location.href = 'fixtures.html';
        return;
      }

      const form = document.getElementById('login-form');
      const errorEl = document.getElementById('login-error');
      const loginBtn = document.getElementById('login-btn');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorEl.classList.add('hidden');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          errorEl.textContent = 'Vui lòng nhập đầy đủ thông tin';
          errorEl.classList.remove('hidden');
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'Đang đăng nhập...';

        try {
          const passwordHash = await hashPassword(password);
          const result = await login(username, passwordHash);
          saveSession({
            username: result.username,
            passwordHash: passwordHash,
            fullName: result.fullName,
            role: result.role,
          });
          window.location.href = 'fixtures.html';
        } catch (err) {
          errorEl.textContent = err.message || 'Đăng nhập thất bại';
          errorEl.classList.remove('hidden');
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Đăng nhập';
        }
      });
    })();
  </script>
</body>
</html>
