<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - WC 2026 Predictions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="text-center mb-6">
        <div class="wc-logo-icon mx-auto mb-3">⚽</div>
        <h1 class="login-title">Đăng ký tài khoản</h1>
        <p class="login-subtitle">Tham gia dự đoán FIFA World Cup 2026</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="full-name">Họ và tên</label>
          <input type="text" id="full-name" class="form-input" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="username">Tên đăng nhập</label>
          <input type="text" id="username" class="form-input" required autocomplete="username" pattern="[a-zA-Z0-9_]+" title="Chỉ dùng chữ, số và dấu gạch dưới">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mật khẩu</label>
          <input type="password" id="password" class="form-input" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Xác nhận mật khẩu</label>
          <input type="password" id="confirm-password" class="form-input" required minlength="6" autocomplete="new-password">
        </div>
        <div id="register-error" class="error-banner hidden"></div>
        <button type="submit" class="btn btn-primary w-full" id="register-btn">Đăng ký</button>
      </form>

      <p class="text-center mt-4 text-sm text-gray-600">
        Đã có tài khoản?
        <a href="login.html" class="text-green-700 font-medium hover:underline">Đăng nhập</a>
      </p>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    (function () {
      if (getSession()) {
        window.location.href = 'fixtures.html';
        return;
      }

      const form = document.getElementById('register-form');
      const errorEl = document.getElementById('register-error');
      const registerBtn = document.getElementById('register-btn');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorEl.classList.add('hidden');

        const fullName = document.getElementById('full-name').value.trim();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (!fullName || !username || !password) {
          errorEl.textContent = 'Vui lòng nhập đầy đủ thông tin';
          errorEl.classList.remove('hidden');
          return;
        }

        if (password.length < 6) {
          errorEl.textContent = 'Mật khẩu phải có ít nhất 6 ký tự';
          errorEl.classList.remove('hidden');
          return;
        }

        if (password !== confirmPassword) {
          errorEl.textContent = 'Mật khẩu xác nhận không khớp';
          errorEl.classList.remove('hidden');
          return;
        }

        registerBtn.disabled = true;
        registerBtn.textContent = 'Đang đăng ký...';

        try {
          const passwordHash = await hashPassword(password);
          const result = await register(username, passwordHash, fullName);
          window.location.href = 'login.html?registered=1';
        } catch (err) {
          errorEl.textContent = err.message || 'Đăng ký thất bại';
          errorEl.classList.remove('hidden');
        } finally {
          registerBtn.disabled = false;
          registerBtn.textContent = 'Đăng ký';
        }
      });
    })();
  </script>
</body>
</html>
