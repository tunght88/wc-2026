<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chưa có nhóm - WC 2026 Predictions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="text-center mb-6">
        <div class="wc-logo-icon mx-auto mb-3">⚽</div>
        <h1 class="login-title">Chưa thuộc nhóm nào</h1>
        <p class="login-subtitle">
          Tài khoản của bạn chưa được thêm vào nhóm dự đoán.
          Vui lòng liên hệ admin để được gán vào nhóm.
        </p>
      </div>
      <div class="flex flex-col gap-3">
        <a href="login.html" class="btn btn-secondary w-full text-center">Quay lại đăng nhập</a>
        <button type="button" id="logout-btn" class="btn btn-primary w-full">Đăng xuất</button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    (function () {
      if (!getSession()) {
        window.location.href = 'login.html';
        return;
      }

      document.getElementById('logout-btn').addEventListener('click', logout);
    })();
  </script>
</body>
</html>
