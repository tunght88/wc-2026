<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tổng quan - WC 2026 Predictions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="wc-header">
    <div class="wc-header-inner">
      <div class="wc-logo">
        <div class="wc-logo-icon">⚽</div>
        <div>
          <div class="wc-title">WC 2026 Predictions</div>
          <div class="wc-subtitle">FIFA World Cup 2026</div>
        </div>
      </div>
      <span class="user-badge" id="user-info"></span>
      <nav id="main-nav"></nav>
    </div>
  </header>

  <div id="reminder-banner" class="reminder-banner hidden" role="alert"></div>

  <main class="wc-main">
    <h1 class="page-title">Tổng quan</h1>
    <div id="error-banner" class="error-banner hidden"></div>

    <div id="dashboard-summary"></div>
    <div id="dashboard-next-match"></div>
    <div id="dashboard-urgent"></div>
    <div id="dashboard-quick-predict"></div>
  </main>

  <div id="loading" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>
  <div id="toast" class="toast"></div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/groups.js"></script>
  <script src="../js/footballApi.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/reminders.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
